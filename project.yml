name: SummarizeContent
options:
  bundleIdPrefix: com.summarizecontent
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.7.9"
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    from: "0.4.3"

targets:
  SummarizeContent:
    type: application
    platform: macOS
    sources:
      - SummarizeContent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.summarizecontent.app
        PRODUCT_NAME: SummarizeContent
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: SummarizeContent/Info.plist
        CODE_SIGN_ENTITLEMENTS: SummarizeContent/SummarizeContent.entitlements
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: WhisperKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: FluidAudio
      - package: YouTubeKit
    entitlements:
      path: SummarizeContent/SummarizeContent.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.network.client: true
